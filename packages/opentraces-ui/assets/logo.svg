        <path d="M1989 4283 c-221 -257 -257 -298 -488 -574 -237 -282 -299 -355 -521 -614 -356 -415 -458 -552 -554 -742 -115 -228 -160 -482 -122 -683 20 -104 27 -122 79 -230 150 -308 519 -492 936 -466 135 9 288 38 409 80 95 32 277 119 317 150 23 18 33 7 -86 101 -35 28 -96 78 -136 113 l-73 63 -64 -25 c-184 -74 -432 -103 -601 -72 -221 42 -362 167 -396 351 -35 186 60 465 235 695 52 69 127 162 136 170 4 3 44 50 91 105 113 136 490 578 693 815 11 14 77 93 146 175 68 83 167 200 218 260 126 148 129 151 192 225 30 35 65 76 78 90 12 13 22 30 22 36 0 18 -276 214 -301 214 -3 0 -98 -107 -210 -237z"/>
      </g>
    </g>
    <!-- Mask: hide orange at crossings where dark goes over -->
    <mask id="w">
      <rect width="437" height="433" fill="white"/>
      <ellipse cx="145" cy="135" rx="55" ry="42" transform="rotate(45,145,135)" fill="black"/>
      <ellipse cx="290" cy="300" rx="55" ry="42" transform="rotate(45,290,300)" fill="black"/>
    </mask>
  </defs>
  <!-- Layer 1: Dark strand (behind) — same shape rotated 90° around center -->
  <use href="#s" fill="currentColor" transform="rotate(90,218.5,216.5)"/>
  <!-- Layer 2: Orange strand (masked — has holes where dark goes over) -->
  <use href="#s" fill="#C2410C" mask="url(#w)"/>
  <!-- Layer 3: Dark strand again at crossing points (over orange) -->
  <g clip-path="url(#cross)">
    <use href="#s" fill="currentColor" transform="rotate(90,218.5,216.5)"/>
  </g>
</svg>